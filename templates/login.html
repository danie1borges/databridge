<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Databridge Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3.1">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>

<body>
    <div id="login-screen" class="login-overlay">
        <!-- Left: Branding panel -->
        <div class="login-left">
            <canvas id="login-canvas"></canvas>
            <div class="login-left-content">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Databridge" class="login-left-logo">
                <div class="login-left-title">Databridge</div>
                <div class="login-left-subtitle">Data Analytics</div>
                <p class="login-left-tagline">Plataforma de análise e inteligência de dados para gestão do CRM e operações.</p>
            </div>
        </div>
        <!-- Right: Login form -->
        <div class="login-right">
            <div class="login-card">
                <!-- Logo visível apenas no mobile (painel esquerdo some) -->
                <div class="login-mobile-brand">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Databridge" class="login-mobile-logo">
                    <div>
                        <div class="login-mobile-title">Databridge</div>
                        <div class="login-mobile-sub text-gradient">Data Analytics</div>
                    </div>
                </div>
                <div class="login-header">
                    <div class="login-header-label">
                        <i class="fa-solid fa-lock"></i> Acesso Restrito
                    </div>
                    <h2>Bem-vindo de volta</h2>
                    <p>Faça login para acessar o sistema</p>
                </div>
                <form id="login-form">
                    <div class="login-field">
                        <label for="login-username"><i class="fa-solid fa-user"></i> Usuário</label>
                        <input type="text" id="login-username" class="form-control" placeholder="Digite seu usuário"
                            autocomplete="username" required>
                    </div>
                    <div class="login-field">
                        <label for="login-password"><i class="fa-solid fa-lock"></i> Senha</label>
                        <input type="password" id="login-password" class="form-control" placeholder="Digite sua senha"
                            autocomplete="current-password" required>
                    </div>
                    <div id="login-error" class="login-error hidden"></div>
                    <button type="submit" id="btn-login-submit" class="btn-login">Entrar <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                </form>
                <div class="login-footer">Databridge &copy; 2026 — Todos os direitos reservados</div>
            </div>
        </div>
    </div>

    <script>
        // Particle animation on left panel
        (function () {
            const canvas = document.getElementById('login-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width  = canvas.parentElement.offsetWidth;
                canvas.height = canvas.parentElement.offsetHeight;
            }
            resize();
            window.addEventListener('resize', () => { resize(); });

            const COLORS = [
                'rgba(248,115,21,',   // orange (brand)
                'rgba(99,102,241,',   // indigo
                'rgba(59,130,246,',   // blue
            ];

            const particles = Array.from({ length: 55 }, () => ({
                x:     Math.random() * canvas.width,
                y:     Math.random() * canvas.height,
                r:     Math.random() * 2 + 0.5,
                vx:    (Math.random() - 0.5) * 0.35,
                vy:    (Math.random() - 0.5) * 0.35,
                alpha: Math.random() * 0.35 + 0.08,
                color: COLORS[Math.floor(Math.random() * COLORS.length)]
            }));

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color + p.alpha + ')';
                    ctx.fill();
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0)            p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0)            p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('login-error');
            const btnSubmit = document.getElementById('btn-login-submit');
            errorEl.classList.add('hidden');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';

            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.error || 'Usuário ou senha inválidos';
                    errorEl.classList.remove('hidden');
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = 'Entrar <i class="fa-solid fa-arrow-right-to-bracket"></i>';
                    return;
                }
                window.location.href = '/app';
            } catch (err) {
                errorEl.textContent = 'Erro de conexão com o servidor';
                errorEl.classList.remove('hidden');
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Entrar <i class="fa-solid fa-arrow-right-to-bracket"></i>';
            }
        });
    </script>
</body>

</html>
